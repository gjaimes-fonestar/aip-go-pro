<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: scripts only from self (no inline eval); styles allow inline (Tailwind);
      connect-src allows the local Go backend on any localhost port.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self';
        style-src   'self' 'unsafe-inline';
        connect-src http://127.0.0.1:* ws://127.0.0.1:* http://localhost:* ws://localhost:*;
        img-src     'self' data:;
        font-src    'self' data:;
      "
    />
    <title>AIP Go Pro</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
